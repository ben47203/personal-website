<!doctype html>
<html lang="en">
<head>
    <!-- Meta and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Ben Bryant</title>
    <!-- External stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
    <!-- Mobile overlay backdrop for sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="site-layout">
        <!-- Header, sidebar, footer injected by initSharedComponents() -->
        <header class="site-header"></header>
        <aside class="site-sidebar" id="sidebar"></aside>

        <!-- ============================================
             PANE 2: MAIN CONTENT — Contact
             ============================================ -->
        <main class="site-main" data-label="2: Contact">
            <section class="pane pane--active" data-pane="2: Contact">
                <div class="main-content">

                    <h1>CONTACT<span class="cursor">&#9608;</span></h1>
                    <p>Have a question, want to collaborate, or just want to say hello? Fill out the form below and I'll get back to you as soon as I can.</p>

                    <!-- Contact form -->
                    <form class="contact-form">

                        <div class="form-group">
                            <label for="contact-name">Name</label>
                            <input type="text" id="contact-name" class="form-input" placeholder="Your name">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-group">
                            <label for="contact-email">Email</label>
                            <input type="email" id="contact-email" class="form-input" placeholder="you@example.com">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" class="form-textarea" placeholder="What's on your mind?"></textarea>
                            <span class="form-error"></span>
                        </div>

                        <button type="submit" class="tui-btn tui-btn--outline">&gt; Send Message</button>

                        <div class="form-success"></div>

                    </form>

                    <!-- Links -->
                    <div class="content-section content-section--spaced">
                        <h2>~/links</h2>
                        <div class="tui-btn-grid">
                            <a href="https://github.com/benbryant0" class="tui-btn" target="_blank">&gt; GitHub</a>
                            <a href="https://linkedin.com/in/benbryant" class="tui-btn" target="_blank">&gt; LinkedIn</a>
                            <a href="help.html" class="tui-btn">&gt; Help</a>
                        </div>
                    </div>

                </div>
            </section>
        </main>
        <footer class="site-footer"></footer>

    </div>

    <!-- External JavaScript -->
    <script>window.PAGE = { base: '', title: 'Contact', breadcrumb: [] };</script>
    <script src="js/script.js?v=4"></script>
</body>
</html>
